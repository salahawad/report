<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Reports</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0b0e;--bg2:#0f1115;--bg3:#151820;
  --border:#1e2229;--border-b:#2a3040;
  --text:#c8d0de;--dim:#5a6578;--white:#eef1f7;
  --amber:#f0a030;--amber-d:rgba(240,160,48,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;line-height:1.6;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{max-width:600px;width:100%;padding:40px 32px}
.lbl{font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--amber);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.lbl::before{content:'';display:inline-block;width:24px;height:1px;background:var(--amber)}
h1{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:.04em;color:var(--white);line-height:.9;margin-bottom:8px}
h1 span{color:var(--amber)}
.sub{color:var(--dim);font-size:12px;margin-bottom:40px}
.teams{display:flex;flex-direction:column;gap:8px}
a.team{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:18px 22px;text-decoration:none;color:var(--text);transition:border-color .2s,background .2s}
a.team:hover{border-color:var(--amber);background:var(--bg3)}
.tname{font-size:14px;font-weight:500;color:var(--white)}
.arrow{color:var(--dim);font-size:18px;transition:color .2s,transform .2s}
a.team:hover .arrow{color:var(--amber);transform:translateX(4px)}
</style>
</head>
<body>
<div class="wrap">
  <div class="lbl">Restricted Access</div>
  <h1>Team <span>Reports</span></h1>
  <p class="sub">Select your team to view the report. Credentials required.</p>
  <div class="teams" id="teams"></div>
</div>
<script>
// Auto-generate team links from folder structure
// Update this list when adding new teams
const teams = [
  { slug: 'test-team', name: 'Test Team (Template)' },
  // Add your teams here:
  // { slug: 'your-team', name: 'Your Team Name' },
];
const container = document.getElementById('teams');
teams.forEach(t => {
  const a = document.createElement('a');
  a.className = 'team';
  a.href = t.slug + '/';
  a.innerHTML = `<span class="tname">${t.name}</span><span class="arrow">&rarr;</span>`;
  container.appendChild(a);
});
</script>
</body>
</html>
